<h2>缩略图边框风格选择</h2>
<p class="subtitle">目标：让缩略图和卡片更协调，不抢视觉中心。</p>

<div class="cards">
  <div class="card option" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:12px;background:#fff;">
      <div style="height:94px;background:linear-gradient(135deg,#cbd5e1,#e2e8f0);border:1px solid rgba(15,23,42,.14);"></div>
    </div>
    <div class="card-body">
      <h3>A 当前风格</h3>
      <p>边框偏硬，和卡片主边框有些“打架”。</p>
    </div>
  </div>

  <div class="card option" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:12px;background:#fff;">
      <div style="height:94px;background:linear-gradient(135deg,#cbd5e1,#e2e8f0);border:1px solid rgba(15,23,42,.08);box-shadow:0 1px 2px rgba(15,23,42,.06);"></div>
    </div>
    <div class="card-body">
      <h3>B 柔和边框（推荐）</h3>
      <p>边框更轻，轻微内凹感，适合现在的蓝白清爽风格。</p>
    </div>
  </div>

  <div class="card option" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-image" style="padding:12px;background:#fff;">
      <div style="height:94px;background:linear-gradient(135deg,#cbd5e1,#e2e8f0);border:1px solid rgba(37,99,235,.2);box-shadow:inset 0 0 0 1px rgba(255,255,255,.75);"></div>
    </div>
    <div class="card-body">
      <h3>C 双层边框</h3>
      <p>更精致，但视觉存在感更强，可能略抢标题注意力。</p>
    </div>
  </div>
</div>
